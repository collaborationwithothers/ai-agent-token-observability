name: Safe Terraform Deletion Fixture

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - dv
          - qa
          - pp
          - pd
      azure_region:
        required: true
        type: choice
        options:
          - eastus
          - eastus2
          - westeurope
      customer_organization_slug:
        required: true
        type: string
      deletion_target:
        required: true
        type: choice
        options:
          - environment
          - edge
          - app_runtime

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  destroy-plan:
    name: Guarded Terraform deletion plan
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        github.repository == 'collaborationwithothers/ai-agent-token-observability' &&
        github.actor == 'haripraghash' &&
        github.ref == 'refs/heads/main'
      }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    outputs:
      artifact_name: ${{ steps.guardrails.outputs.artifact_name }}
      destroy_scope: ${{ steps.guardrails.outputs.destroy_scope }}
      target_stages: ${{ steps.guardrails.outputs.target_stages }}
      terraform_workspace: ${{ steps.guardrails.outputs.terraform_workspace }}
    steps:
      - name: Validate guardrails before privileged steps
        id: guardrails
        env:
          REQUIRED_REPOSITORY: collaborationwithothers/ai-agent-token-observability
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          DELETION_TARGET: ${{ inputs.deletion_target }}
        run: |
          set -euo pipefail
          DISPOSABLE_STAGE_ORDER="edge app_runtime"
          RETAINED_STAGE_DENY_LIST="foundation public_dns"
          test "${GITHUB_REPOSITORY}" = "${REQUIRED_REPOSITORY}"
          test "${GITHUB_EVENT_NAME}" = "workflow_dispatch"
          test "${GITHUB_ACTOR}" = "haripraghash"
          test "${GITHUB_REF}" = "refs/heads/main"
          case "${GITHUB_REF_NAME}:${ENVIRONMENT}" in main:dv|main:qa|main:pp|main:pd) ;; *) exit 1 ;; esac
          case "${ENVIRONMENT}" in dv|qa|pp|pd) ;; *) exit 1 ;; esac
          case "${AZURE_REGION}" in eastus|eastus2|westeurope) ;; *) exit 1 ;; esac
          case "${CUSTOMER_ORGANIZATION_SLUG}" in *[!a-z0-9-]*|""|-*|*-) exit 1 ;; esac
          case "${DELETION_TARGET}" in environment|edge|app_runtime) ;; *) exit 1 ;; esac
          TF_WORKSPACE="${ENVIRONMENT}_${AZURE_REGION}_${CUSTOMER_ORGANIZATION_SLUG}"
          test "${TF_WORKSPACE}" != "default"
          if [[ "${DELETION_TARGET}" == "environment" ]]; then
            DESTROY_SCOPE="environment"
            TARGET_STAGES="${DISPOSABLE_STAGE_ORDER}"
          else
            DESTROY_SCOPE="stage"
            TARGET_STAGES="${DELETION_TARGET}"
          fi
          ARTIFACT_NAME="terraform-destroy-plans-${DESTROY_SCOPE}-${TF_WORKSPACE}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "destroy_scope=${DESTROY_SCOPE}" >> "${GITHUB_OUTPUT}"
          echo "target_stages=${TARGET_STAGES}" >> "${GITHUB_OUTPUT}"
          echo "terraform_workspace=${TF_WORKSPACE}" >> "${GITHUB_OUTPUT}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform deletion plan
        run: |
          DESTROY_PLAN_FILE="${RUNNER_TEMP}/edge-destroy.tfplan"
          terraform -chdir="infrastructure/azure/stages/edge" plan -destroy -out="${DESTROY_PLAN_FILE}"

      - name: Upload deletion plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.guardrails.outputs.artifact_name }}
          path: ${{ runner.temp }}/terraform-destroy-plans

  destroy-apply:
    name: Guarded Terraform deletion apply
    needs: destroy-plan
    if: >-
      ${{
        needs.destroy-plan.result == 'success' &&
        github.event_name == 'workflow_dispatch' &&
        github.repository == 'collaborationwithothers/ai-agent-token-observability' &&
        github.actor == 'haripraghash' &&
        github.ref == 'refs/heads/main'
      }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    environment:
      name: terraform-deletion-approval
    steps:
      - name: Validate guardrails before privileged steps
        env:
          REQUIRED_REPOSITORY: collaborationwithothers/ai-agent-token-observability
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          DELETION_TARGET: ${{ inputs.deletion_target }}
          DESTROY_SCOPE: ${{ needs.destroy-plan.outputs.destroy_scope }}
          TARGET_STAGES: ${{ needs.destroy-plan.outputs.target_stages }}
          TF_WORKSPACE: ${{ needs.destroy-plan.outputs.terraform_workspace }}
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "${REQUIRED_REPOSITORY}"
          test "${GITHUB_EVENT_NAME}" = "workflow_dispatch"
          test "${GITHUB_ACTOR}" = "haripraghash"
          test "${GITHUB_REF}" = "refs/heads/main"
          case "${GITHUB_REF_NAME}:${ENVIRONMENT}" in main:dv|main:qa|main:pp|main:pd) ;; *) exit 1 ;; esac
          case "${DESTROY_SCOPE}" in environment|stage) ;; *) exit 1 ;; esac
          test "${TF_WORKSPACE}" = "${ENVIRONMENT}_${AZURE_REGION}_${CUSTOMER_ORGANIZATION_SLUG}"
          test "${TF_WORKSPACE}" != "default"
          test -n "${TARGET_STAGES}"

      - name: Download approved deletion plan artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.destroy-plan.outputs.artifact_name }}
          path: ${{ runner.temp }}/terraform-destroy-plans

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform deletion apply
        run: |
          DESTROY_PLAN_FILE="${RUNNER_TEMP}/terraform-destroy-plans/edge/edge-destroy.tfplan"
          terraform -chdir="infrastructure/azure/stages/edge" apply -input=false "${DESTROY_PLAN_FILE}"
