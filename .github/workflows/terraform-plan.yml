name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dv
          - qa
          - pp
          - pd
      azure_region:
        description: Azure region for this workspace.
        required: true
        type: choice
        options:
          - eastus
          - eastus2
          - westeurope
      customer_organization_slug:
        description: Customer organization slug. Defaults to internal; override when needed.
        required: false
        default: internal
        type: string
      terraform_stage:
        description: Optional Terraform stage. Leave blank to deploy all environment-scoped stages.
        required: false
        type: string
      acr_publish_run_id:
        description: Optional app_runtime ACR Image Publish run override. Leave blank to use the latest successful matching run.
        required: false
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  select:
    name: Select Terraform deployment scope
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        github.repository == 'collaborationwithothers/ai-agent-token-observability' &&
        github.actor == 'haripraghash' &&
        github.ref == 'refs/heads/main'
      }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    outputs:
      deployment_scope: ${{ steps.guardrails.outputs.deployment_scope }}
      terraform_workspace: ${{ steps.guardrails.outputs.terraform_workspace }}
      deploy_foundation: ${{ steps.guardrails.outputs.deploy_foundation }}
      deploy_network_private_data_plane: ${{ steps.guardrails.outputs.deploy_network_private_data_plane }}
      deploy_observability_foundation: ${{ steps.guardrails.outputs.deploy_observability_foundation }}
      deploy_data_platform: ${{ steps.guardrails.outputs.deploy_data_platform }}
      deploy_ai_services: ${{ steps.guardrails.outputs.deploy_ai_services }}
      deploy_app_runtime: ${{ steps.guardrails.outputs.deploy_app_runtime }}
      acr_publish_run_id: ${{ steps.guardrails.outputs.acr_publish_run_id }}
      deploy_managed_grafana: ${{ steps.guardrails.outputs.deploy_managed_grafana }}
      deploy_edge: ${{ steps.guardrails.outputs.deploy_edge }}
    steps:
      - name: Validate guardrails before privileged steps
        id: guardrails
        env:
          REQUIRED_REPOSITORY: collaborationwithothers/ai-agent-token-observability
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TERRAFORM_STAGE_INPUT: ${{ inputs.terraform_stage }}
          ACR_PUBLISH_RUN_ID_INPUT: ${{ inputs.acr_publish_run_id }}
        run: |
          set -euo pipefail

          ENVIRONMENT_STAGE_ORDER="foundation network_private_data_plane observability_foundation data_platform ai_services app_runtime managed_grafana edge"
          EXCLUDED_SHARED_STAGES="public_dns"

          test "${GITHUB_REPOSITORY}" = "${REQUIRED_REPOSITORY}"
          test "${GITHUB_EVENT_NAME}" = "workflow_dispatch"
          test "${GITHUB_ACTOR}" = "haripraghash"
          test "${GITHUB_REF}" = "refs/heads/main"
          case "${GITHUB_REF_NAME}:${ENVIRONMENT}" in main:dv|main:qa|main:pp|main:pd) ;; *) exit 1 ;; esac
          case "${ENVIRONMENT}" in dv|qa|pp|pd) ;; *) exit 1 ;; esac
          case "${AZURE_REGION}" in eastus|eastus2|westeurope) ;; *) exit 1 ;; esac
          case "${CUSTOMER_ORGANIZATION_SLUG}" in *[!a-z0-9-]*|""|-*|*-) exit 1 ;; esac

          TF_WORKSPACE="${ENVIRONMENT}_${AZURE_REGION}_${CUSTOMER_ORGANIZATION_SLUG}"
          test "${TF_WORKSPACE}" != "default"

          TERRAFORM_STAGE="$(printf '%s' "${TERRAFORM_STAGE_INPUT}" | tr -d '[:space:]')"
          if [[ -z "${TERRAFORM_STAGE}" ]]; then
            DEPLOYMENT_SCOPE="environment"
            DEPLOY_FOUNDATION=true
            DEPLOY_NETWORK_PRIVATE_DATA_PLANE=true
            DEPLOY_OBSERVABILITY_FOUNDATION=true
            DEPLOY_DATA_PLATFORM=true
            DEPLOY_AI_SERVICES=true
            DEPLOY_APP_RUNTIME=true
            DEPLOY_MANAGED_GRAFANA=true
            DEPLOY_EDGE=true
          else
            case "${TERRAFORM_STAGE}" in
              foundation|network_private_data_plane|observability_foundation|data_platform|ai_services|app_runtime|managed_grafana|edge) ;;
              public_dns)
                echo "public_dns is retained shared DNS infrastructure and is not deployed by this workflow." >&2
                exit 1
                ;;
              *)
                echo "Unsupported Terraform stage: ${TERRAFORM_STAGE}" >&2
                exit 1
                ;;
            esac
            DEPLOYMENT_SCOPE="stage"
            DEPLOY_FOUNDATION=false
            DEPLOY_NETWORK_PRIVATE_DATA_PLANE=false
            DEPLOY_OBSERVABILITY_FOUNDATION=false
            DEPLOY_DATA_PLATFORM=false
            DEPLOY_AI_SERVICES=false
            DEPLOY_APP_RUNTIME=false
            DEPLOY_MANAGED_GRAFANA=false
            DEPLOY_EDGE=false
            case "${TERRAFORM_STAGE}" in
              foundation) DEPLOY_FOUNDATION=true ;;
              network_private_data_plane) DEPLOY_NETWORK_PRIVATE_DATA_PLANE=true ;;
              observability_foundation) DEPLOY_OBSERVABILITY_FOUNDATION=true ;;
              data_platform) DEPLOY_DATA_PLATFORM=true ;;
              ai_services) DEPLOY_AI_SERVICES=true ;;
              app_runtime) DEPLOY_APP_RUNTIME=true ;;
              managed_grafana) DEPLOY_MANAGED_GRAFANA=true ;;
              edge) DEPLOY_EDGE=true ;;
            esac
          fi

          ACR_PUBLISH_RUN_ID="$(printf '%s' "${ACR_PUBLISH_RUN_ID_INPUT}" | tr -d '[:space:]')"
          if [[ "${DEPLOY_APP_RUNTIME}" == "true" ]]; then
            case "${ACR_PUBLISH_RUN_ID}" in ''|*[!0-9]*) [[ -z "${ACR_PUBLISH_RUN_ID}" ]] || { echo "acr_publish_run_id must be numeric when supplied." >&2; exit 1; } ;; esac
          elif [[ -n "${ACR_PUBLISH_RUN_ID}" ]]; then
            echo "acr_publish_run_id is accepted only when app_runtime is selected." >&2
            exit 1
          fi

          {
            echo "deployment_scope=${DEPLOYMENT_SCOPE}"
            echo "terraform_workspace=${TF_WORKSPACE}"
            echo "deploy_foundation=${DEPLOY_FOUNDATION}"
            echo "deploy_network_private_data_plane=${DEPLOY_NETWORK_PRIVATE_DATA_PLANE}"
            echo "deploy_observability_foundation=${DEPLOY_OBSERVABILITY_FOUNDATION}"
            echo "deploy_data_platform=${DEPLOY_DATA_PLATFORM}"
            echo "deploy_ai_services=${DEPLOY_AI_SERVICES}"
            echo "deploy_app_runtime=${DEPLOY_APP_RUNTIME}"
            echo "acr_publish_run_id=${ACR_PUBLISH_RUN_ID}"
            echo "deploy_managed_grafana=${DEPLOY_MANAGED_GRAFANA}"
            echo "deploy_edge=${DEPLOY_EDGE}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Terraform Deployment Scope"
            echo
            echo "Workspace: ${TF_WORKSPACE}"
            echo "Deployment scope: ${DEPLOYMENT_SCOPE}"
            echo "Environment stage order: ${ENVIRONMENT_STAGE_ORDER}"
            echo "Excluded shared stages: ${EXCLUDED_SHARED_STAGES}"
            if [[ "${DEPLOY_APP_RUNTIME}" == "true" ]]; then
              if [[ -n "${ACR_PUBLISH_RUN_ID}" ]]; then
                echo "ACR image publish run override: ${ACR_PUBLISH_RUN_ID}"
              else
                echo "ACR image publish run override: latest successful matching run"
              fi
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  validate-app-runtime-images:
    name: Validate app runtime image digest artifact
    needs: select
    outputs:
      acr_publish_run_id: ${{ steps.resolve-images.outputs.acr_publish_run_id }}
      acr_publish_commit_sha: ${{ steps.resolve-images.outputs.acr_publish_commit_sha }}
      app_runtime_image_artifact_name: ${{ steps.resolve-images.outputs.app_runtime_image_artifact_name }}
      verified_app_runtime_image_artifact_name: ${{ steps.resolve-images.outputs.verified_app_runtime_image_artifact_name }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    steps:
      - name: Resolve and validate ACR image publish run
        id: resolve-images
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_APP_RUNTIME: ${{ needs.select.outputs.deploy_app_runtime }}
          ACR_PUBLISH_RUN_ID: ${{ needs.select.outputs.acr_publish_run_id }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
        run: |
          set -euo pipefail

          if [[ "${DEPLOY_APP_RUNTIME}" != "true" ]]; then
            echo "app_runtime not selected; no ACR image digest artifact required." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          find_latest_matching_run() {
            gh api --paginate \
              -X GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/acr-image-publish.yml/runs" \
              -f branch=main \
              -f event=workflow_dispatch \
              -f status=success \
              -f per_page=100 \
              --jq '.workflow_runs[] | [.id, .head_sha] | @tsv' \
              | while IFS=$'\t' read -r candidate_run_id candidate_sha; do
                  candidate_artifact_name="app-runtime-image-digests-${TF_WORKSPACE}-${candidate_sha}"
                  if gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}/artifacts" \
                    --jq ".artifacts[] | select(.name == \"${candidate_artifact_name}\" and .expired == false) | .name" \
                    | grep -Fx "${candidate_artifact_name}" >/dev/null; then
                    jq -n \
                      --arg run_id "${candidate_run_id}" \
                      --arg sha "${candidate_sha}" \
                      --arg artifact_name "${candidate_artifact_name}" \
                      '{run_id: $run_id, sha: $sha, artifact_name: $artifact_name}'
                    return 0
                  fi
                done
          }

          SELECTION_MODE="explicit"
          if [[ -z "${ACR_PUBLISH_RUN_ID}" ]]; then
            SELECTION_MODE="latest-successful"
            SELECTED_RUN="$(find_latest_matching_run)"
            if [[ -z "${SELECTED_RUN}" ]]; then
              echo "No successful ACR Image Publish run with a non-expired app runtime image artifact was found for workspace ${TF_WORKSPACE}." >&2
              exit 1
            fi
            ACR_PUBLISH_RUN_ID="$(jq -r '.run_id' <<<"${SELECTED_RUN}")"
          fi

          RUN_JSON="$(gh run view "${ACR_PUBLISH_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --json databaseId,workflowName,headBranch,headSha,conclusion,status,event,url)"
          ACR_PUBLISH_COMMIT_SHA="$(jq -r '.headSha' <<<"${RUN_JSON}")"
          APP_RUNTIME_IMAGE_ARTIFACT_NAME="app-runtime-image-digests-${TF_WORKSPACE}-${ACR_PUBLISH_COMMIT_SHA}"
          VERIFIED_APP_RUNTIME_IMAGE_ARTIFACT_NAME="verified-${APP_RUNTIME_IMAGE_ARTIFACT_NAME}"

          test "$(jq -r '.databaseId' <<<"${RUN_JSON}")" = "${ACR_PUBLISH_RUN_ID}"
          test "$(jq -r '.workflowName' <<<"${RUN_JSON}")" = "ACR Image Publish"
          test "$(jq -r '.headBranch' <<<"${RUN_JSON}")" = "main"
          case "${ACR_PUBLISH_COMMIT_SHA}" in [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;; *) echo "Selected ACR Image Publish run does not have a 40-character lowercase commit SHA." >&2; exit 1 ;; esac
          test "$(jq -r '.conclusion' <<<"${RUN_JSON}")" = "success"
          test "$(jq -r '.status' <<<"${RUN_JSON}")" = "completed"
          test "$(jq -r '.event' <<<"${RUN_JSON}")" = "workflow_dispatch"

          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ACR_PUBLISH_RUN_ID}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${APP_RUNTIME_IMAGE_ARTIFACT_NAME}\" and .expired == false) | .name" \
            | grep -Fx "${APP_RUNTIME_IMAGE_ARTIFACT_NAME}" >/dev/null

          mkdir -p "${RUNNER_TEMP}/app-runtime-images"
          gh run download "${ACR_PUBLISH_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${APP_RUNTIME_IMAGE_ARTIFACT_NAME}" \
            --dir "${RUNNER_TEMP}/app-runtime-images"

          APP_RUNTIME_IMAGES_TFVARS_PATH="${RUNNER_TEMP}/app-runtime-images/app-runtime-images.auto.tfvars.json"
          test -s "${APP_RUNTIME_IMAGES_TFVARS_PATH}"
          jq -e '
            .container_registry_server | test("^[a-zA-Z0-9]+[.]azurecr[.]io$")
          ' "${APP_RUNTIME_IMAGES_TFVARS_PATH}" >/dev/null
          jq -e '
            .dashboard_image | test("^[a-zA-Z0-9]+[.]azurecr[.]io/product-dashboard@sha256:[0-9a-f]{64}$")
          ' "${APP_RUNTIME_IMAGES_TFVARS_PATH}" >/dev/null
          jq -e '
            .product_api_image | test("^[a-zA-Z0-9]+[.]azurecr[.]io/product-api@sha256:[0-9a-f]{64}$")
          ' "${APP_RUNTIME_IMAGES_TFVARS_PATH}" >/dev/null
          jq -e '
            .product_ingestion_image | test("^[a-zA-Z0-9]+[.]azurecr[.]io/product-ingestion@sha256:[0-9a-f]{64}$")
          ' "${APP_RUNTIME_IMAGES_TFVARS_PATH}" >/dev/null
          jq -e '
            .shared_jobs_image | test("^[a-zA-Z0-9]+[.]azurecr[.]io/product-jobs@sha256:[0-9a-f]{64}$")
          ' "${APP_RUNTIME_IMAGES_TFVARS_PATH}" >/dev/null

          {
            echo "acr_publish_run_id=${ACR_PUBLISH_RUN_ID}"
            echo "acr_publish_commit_sha=${ACR_PUBLISH_COMMIT_SHA}"
            echo "app_runtime_image_artifact_name=${APP_RUNTIME_IMAGE_ARTIFACT_NAME}"
            echo "verified_app_runtime_image_artifact_name=${VERIFIED_APP_RUNTIME_IMAGE_ARTIFACT_NAME}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## App Runtime Image Evidence"
            echo
            echo "ACR publish run: ${ACR_PUBLISH_RUN_ID}"
            echo "Selection mode: ${SELECTION_MODE}"
            echo "Commit SHA: ${ACR_PUBLISH_COMMIT_SHA}"
            echo "Workspace: ${TF_WORKSPACE}"
            echo "Environment: ${ENVIRONMENT}"
            echo "Region: ${AZURE_REGION}"
            echo "Artifact: ${APP_RUNTIME_IMAGE_ARTIFACT_NAME}"
            echo "Repositories: product-dashboard, product-api, product-ingestion, product-jobs"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload verified app runtime image digest artifact
        if: ${{ needs.select.outputs.deploy_app_runtime == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve-images.outputs.verified_app_runtime_image_artifact_name }}
          path: ${{ runner.temp }}/app-runtime-images/app-runtime-images.auto.tfvars.json
          if-no-files-found: error
          retention-days: 14

  plan-foundation:
    name: Plan foundation
    needs: [select, validate-app-runtime-images]
    if: ${{ needs.select.outputs.deploy_foundation == 'true' && needs.validate-app-runtime-images.result == 'success' }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false
      - name: Terraform plan
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          PLAN_ARTIFACT_DIR: ${{ runner.temp }}/terraform-plans
          TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
          TF_STATE_STORAGE_ACCOUNT_NAME: ${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}
          TF_STATE_CONTAINER_NAME: ${{ vars.TF_STATE_CONTAINER_NAME }}
        run: |
          set -euo pipefail
          TERRAFORM_STAGE="foundation" bash scripts/terraform-stage-deploy.sh plan
          printf 'Planned `%s` for workspace `%s`.\n' "foundation" "${TF_WORKSPACE}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-foundation-${{ needs.select.outputs.terraform_workspace }}
          path: ${{ runner.temp }}/terraform-plans/foundation
          if-no-files-found: error
          retention-days: 14

  apply-foundation:
    name: Apply foundation
    needs: [select, plan-foundation]
    if: ${{ needs.plan-foundation.result == 'success' }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    environment:
      name: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v5
        with:
          name: terraform-plan-foundation-${{ needs.select.outputs.terraform_workspace }}
          path: ${{ runner.temp }}/terraform-plans/foundation
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false
      - name: Terraform apply
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          PLAN_ARTIFACT_DIR: ${{ runner.temp }}/terraform-plans
          TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
          TF_STATE_STORAGE_ACCOUNT_NAME: ${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}
          TF_STATE_CONTAINER_NAME: ${{ vars.TF_STATE_CONTAINER_NAME }}
        run: |
          set -euo pipefail
          TERRAFORM_STAGE="foundation" bash scripts/terraform-stage-deploy.sh apply
          printf 'Applied `%s` for workspace `%s`.\n' "foundation" "${TF_WORKSPACE}" >> "${GITHUB_STEP_SUMMARY}"

  plan-network-private-data-plane:
    name: Plan network_private_data_plane
    needs: [select, validate-app-runtime-images, apply-foundation]
    if: ${{ always() && needs.select.outputs.deploy_network_private_data_plane == 'true' && needs.validate-app-runtime-images.result == 'success' && (needs.select.outputs.deployment_scope == 'stage' || needs.apply-foundation.result == 'success') }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false
      - name: Terraform plan
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          PLAN_ARTIFACT_DIR: ${{ runner.temp }}/terraform-plans
          TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
          TF_STATE_STORAGE_ACCOUNT_NAME: ${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}
          TF_STATE_CONTAINER_NAME: ${{ vars.TF_STATE_CONTAINER_NAME }}
        run: |
          set -euo pipefail
          TERRAFORM_STAGE="network_private_data_plane" bash scripts/terraform-stage-deploy.sh plan
          printf 'Planned `%s` for workspace `%s`.\n' "network_private_data_plane" "${TF_WORKSPACE}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-network_private_data_plane-${{ needs.select.outputs.terraform_workspace }}
          path: ${{ runner.temp }}/terraform-plans/network_private_data_plane
          if-no-files-found: error
          retention-days: 14

  apply-network-private-data-plane:
    name: Apply network_private_data_plane
    needs: [select, plan-network-private-data-plane]
    if: ${{ needs.plan-network-private-data-plane.result == 'success' }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    environment:
      name: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v5
        with:
          name: terraform-plan-network_private_data_plane-${{ needs.select.outputs.terraform_workspace }}
          path: ${{ runner.temp }}/terraform-plans/network_private_data_plane
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false
      - name: Terraform apply
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          PLAN_ARTIFACT_DIR: ${{ runner.temp }}/terraform-plans
          TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
          TF_STATE_STORAGE_ACCOUNT_NAME: ${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}
          TF_STATE_CONTAINER_NAME: ${{ vars.TF_STATE_CONTAINER_NAME }}
        run: |
          set -euo pipefail
          TERRAFORM_STAGE="network_private_data_plane" bash scripts/terraform-stage-deploy.sh apply
          printf 'Applied `%s` for workspace `%s`.\n' "network_private_data_plane" "${TF_WORKSPACE}" >> "${GITHUB_STEP_SUMMARY}"

  plan-observability-foundation:
    name: Plan observability_foundation
    needs: [select, validate-app-runtime-images, apply-network-private-data-plane]
    if: ${{ always() && needs.select.outputs.deploy_observability_foundation == 'true' && needs.validate-app-runtime-images.result == 'success' && (needs.select.outputs.deployment_scope == 'stage' || needs.apply-network-private-data-plane.result == 'success') }}
    runs-on:
      group: consultwithcloud-azure
      labels: [gh-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false
      - name: Terraform plan
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          AZURE_REGION: ${{ inputs.azure_region }}
          CUSTOMER_ORGANIZATION_SLUG: ${{ inputs.customer_organization_slug }}
          TF_WORKSPACE: ${{ needs.select.outputs.terraform_workspace }}
          PLAN_ARTIFACT_DIR: ${{ runner.temp }}/terraform-plans
          TF_STATE_RESOURCE_GROUP_NAME: ${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}
